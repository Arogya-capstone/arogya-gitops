{{- $ns := .Values.global.namespace }}
---
# Public routes (no JWT required)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-routes
  namespace: {{ $ns }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: arogya-gateway
    namespace: {{ $ns }}
  rules:
  # /api/auth/* → user-service
  - matches:
    - path: { type: PathPrefix, value: /api/auth }
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1

  # POST /register → user-service (GET /register → frontend SPA login page)
  - matches:
    - path: { type: Exact, value: /register }
      method: POST
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1

  # POST /login → user-service (GET /login → frontend SPA)
  - matches:
    - path: { type: Exact, value: /login }
      method: POST
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1

  # /me, /doctors, /users → user-service (pure API endpoints, not SPA pages)
  - matches:
    - path: { type: PathPrefix, value: /me }
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /doctors }
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /users }
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1

  # /appointments — only route when Authorization header present (API call).
  # Browser page refresh (no auth header) falls through to frontend catch-all.
  - matches:
    - path: { type: PathPrefix, value: /appointments }
      headers:
      - name: Authorization
        type: RegularExpression
        value: "Bearer .+"
    backendRefs:
    - group: ""
      kind: Service
      name: appointment-service
      port: 8002
      weight: 1

  # /health-records → health-service (SPA uses /records — no conflict)
  - matches:
    - path: { type: PathPrefix, value: /health-records }
    backendRefs:
    - group: ""
      kind: Service
      name: health-service
      port: 8003
      weight: 1

  # /documents — only route when Authorization header present (API call).
  # Browser page refresh (no auth header) falls through to frontend catch-all.
  - matches:
    - path: { type: PathPrefix, value: /documents }
      headers:
      - name: Authorization
        type: RegularExpression
        value: "Bearer .+"
    backendRefs:
    - group: ""
      kind: Service
      name: document-service
      port: 8004
      weight: 1

  # /health → user-service health check
  - matches:
    - path: { type: PathPrefix, value: /health }
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1

  # Frontend catch-all — serves index.html for SPA routing and unauthenticated page refreshes
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - group: ""
      kind: Service
      name: frontend
      port: 8080
      weight: 1
---
# Protected routes (SecurityPolicy removed — JWT enforced in service layer)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: protected-routes
  namespace: {{ $ns }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: arogya-gateway
    namespace: {{ $ns }}
  rules:
  - matches:
    - path: { type: PathPrefix, value: /api/users }
    backendRefs:
    - group: ""
      kind: Service
      name: user-service
      port: 8001
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /api/appointments }
    backendRefs:
    - group: ""
      kind: Service
      name: appointment-service
      port: 8002
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /api/health }
    backendRefs:
    - group: ""
      kind: Service
      name: health-service
      port: 8003
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /api/documents }
    backendRefs:
    - group: ""
      kind: Service
      name: document-service
      port: 8004
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /api/rag }
    backendRefs:
    - group: ""
      kind: Service
      name: rag-service
      port: 8005
      weight: 1
  - matches:
    - path: { type: PathPrefix, value: /rag }
    backendRefs:
    - group: ""
      kind: Service
      name: rag-service
      port: 8005
      weight: 1
