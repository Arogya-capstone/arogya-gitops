{{- $ns := .Values.global.namespace }}

{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
  - name: http
    port: {{ $svc.port }}
    targetPort: http
{{- end }}
{{- end }}
