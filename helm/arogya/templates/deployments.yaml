{{- $ns := .Values.global.namespace }}
{{- $registry := .Values.global.imageRegistry }}
{{- $tag := .Values.global.imageTag }}

{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/part-of: arogya
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      serviceAccountName: sa-{{ $name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- if $svc.migrations }}
      initContainers:
      - name: migrate
        image: {{ $registry }}/arogya/{{ $name }}:{{ $tag }}
        imagePullPolicy: Always
        command: ["alembic", "upgrade", "head"]
        env:
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: APP_ENV
          value: {{ $ns | replace "arogya-" "" | quote }}
        - name: APP_SECRETS_PREFIX
          value: {{ printf "arogya/%s/" ($ns | replace "arogya-" "") | quote }}
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "200m", memory: "256Mi" }
      {{- end }}
      containers:
      - name: {{ $name }}
        image: {{ $registry }}/arogya/{{ $name }}:{{ $tag }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: {{ $svc.port }}
        env:
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: APP_ENV
          value: {{ $ns | replace "arogya-" "" | quote }}
        - name: APP_SECRETS_PREFIX
          value: {{ printf "arogya/%s/" ($ns | replace "arogya-" "") | quote }}
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        {{- if eq $name "document-service" }}
        - name: S3_ENDPOINT
          value: ""
        - name: S3_BUCKET_NAME
          value: {{ $.Values.s3.bucketName | quote }}
        - name: SQS_RAG_QUEUE_URL
          value: {{ $.Values.ragWorker.sqsQueueUrl | quote }}
        {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet: { path: /healthz, port: http }
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet: { path: /ready, port: http }
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ $svc.resources.requests.cpu | quote }}
            memory: {{ $svc.resources.requests.memory | quote }}
          limits:
            cpu: {{ $svc.resources.limits.cpu | quote }}
            memory: {{ $svc.resources.limits.memory | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: {{ $name }}
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}
{{- end }}

{{- if .Values.ragWorker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: {{ $ns }}
  labels:
    app: rag-worker
    app.kubernetes.io/part-of: arogya
spec:
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
    spec:
      serviceAccountName: sa-rag-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: rag-worker
        image: {{ $registry }}/arogya/rag-worker:{{ $tag }}
        imagePullPolicy: Always
        env:
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.global.awsRegion | quote }}
        - name: APP_SECRETS_PREFIX
          value: "arogya/{{ .Values.global.namespace | replace "arogya-" "" }}/"
        - name: CHUNK_SIZE
          value: {{ .Values.ragWorker.chunkSize | quote }}
        - name: CHUNK_OVERLAP
          value: {{ .Values.ragWorker.chunkOverlap | quote }}
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: S3_BUCKET_NAME
          value: {{ .Values.s3.bucketName | quote }}
        - name: SQS_RAG_QUEUE_URL
          value: {{ .Values.ragWorker.sqsQueueUrl | quote }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: {{ .Values.ragWorker.resources.requests.cpu | quote }}
            memory: {{ .Values.ragWorker.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.ragWorker.resources.limits.cpu | quote }}
            memory: {{ .Values.ragWorker.resources.limits.memory | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}
